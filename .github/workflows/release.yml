name: Release

# Build and publish a release (with build-provenance attestations) whenever a
# version tag is pushed, e.g. `git tag 1.2.1 && git push origin 1.2.1`.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release
  id-token: write # build-provenance attestations
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          notes="$(mktemp)"
          # Pull this version's section out of CHANGELOG.md (between "## [TAG]"
          # and the next "## [" heading); fall back to a generic line.
          awk -v h="## [$TAG]" '
            index($0, h) == 1 { f = 1; next }
            /^## \[/ { if (f) exit }
            f { print }
          ' CHANGELOG.md > "$notes"
          if [ ! -s "$notes" ]; then echo "Release $TAG" > "$notes"; fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$notes" \
            main.js manifest.json styles.css
